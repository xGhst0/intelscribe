# IntelScribe theme collection. Each theme = palette + default cover art
# generator + seed. Cover art styles: hexgrid, circuit, network, radar,
# binary, contours. Any theme can be paired with any art style in the app,
# so 18 palettes x 6 generators = 108 distinct looks.

