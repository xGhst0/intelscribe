<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelScribe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="editor">
      <header class="brand">
        <h1>IntelScribe</h1>
        <span class="tag">M2</span>
      </header>
      <div class="toolbar">
        <div class="toolbar-row">
          <select id="theme-select" title="Theme"></select>
          <select id="art-select" title="Cover art"></select>
        </div>
        <div class="toolbar-row">
          <button id="btn-new" type="button">New</button>
          <button id="btn-open" type="button">Open</button>
          <button id="btn-save" type="button">Save</button>
          <button id="btn-export-docx" type="button" title="Export Word document">DOCX</button>
          <button id="btn-export" type="button" class="primary" title="Export PDF">PDF</button>
        </div>
      </div>
      <div id="lint" class="lint clean">Report checks will appear here.</div>
      <div id="form"></div>
    </aside>
    <main id="preview-pane">
      <div id="status" class="status">Starting…</div>
      <div id="pages"></div>
    </main>
  </div>
  <datalist id="tech-list"></datalist>
  <datalist id="ism-list"></datalist>
  <script src="app.js"></script>
</body>
</html>
